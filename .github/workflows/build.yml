name: Test and Build container

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    # Self-hosted runners: musl.cc blocks GitHub-hosted runner IPs wholesale
    # (since 2025-05-27), so the cross-toolchain downloads fail on ubuntu-latest.
    # rehosting-arc egress is not blocked and matches the publish environment.
    runs-on: rehosting-arc

    steps:
      - name: Trust Harbor's self-signed certificate
        run: |
          echo "Fetching certificate from ${{ secrets.REHOSTING_ARC_REGISTRY }}"
          openssl s_client -showcerts -connect ${{ secrets.REHOSTING_ARC_REGISTRY }}:443 < /dev/null 2>/dev/null | openssl x509 -outform PEM | sudo tee /usr/local/share/ca-certificates/harbor.crt > /dev/null
          sudo update-ca-certificates

      - name: Log in to Rehosting Arc Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REHOSTING_ARC_REGISTRY }}
          username: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
          password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}

      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host
          buildkitd-config-inline: |
            [registry."${{ secrets.REHOSTING_ARC_REGISTRY }}"]
              insecure = true
              http = true

      # Validate the image builds (exercises every cross-toolchain stage).
      # Reuse the publish cache so unchanged layers don't re-download from
      # musl.cc; don't push -- this is a PR check.
      - name: Build embedded-toolchains (validate, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          target: final
          build-args: |
            REGISTRY=${{ secrets.REHOSTING_ARC_REGISTRY }}/proxy
          cache-from: |
            type=registry,ref=${{ secrets.REHOSTING_ARC_REGISTRY }}/rehosting/embedded-toolchains:cache,mode=max
